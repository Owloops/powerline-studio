name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v6
        with:
          path: powerline-studio

      - uses: actions/checkout@v6
        with:
          repository: Owloops/claude-powerline
          ref: main
          path: claude-powerline

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build claude-powerline
        working-directory: claude-powerline
        run: |
          npm install
          npm run build

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install vite-plus CLI
        working-directory: powerline-studio
        run: pnpm install

      - name: Build powerline-studio
        working-directory: powerline-studio
        run: pnpm run build-only --base /powerline-studio/

      - name: Add 404 fallback for SPA routing
        run: cp powerline-studio/dist/index.html powerline-studio/dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: powerline-studio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
