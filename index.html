<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<link rel="canonical" href="https://powerline.owloops.com" />
		<meta
			name="description"
			content="Visual configuration editor for claude-powerline — design themes, styles, segments, and TUI layouts for your Claude Code status line (/statusline) with a live terminal preview."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Powerline Studio" />
		<meta
			property="og:description"
			content="Visual configuration editor for claude-powerline — design themes, styles, segments, and TUI layouts for your Claude Code status line (/statusline) with a live terminal preview."
		/>
		<meta property="og:image" content="https://powerline.owloops.com/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://powerline.owloops.com" />
		<meta property="og:site_name" content="Powerline Studio" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Powerline Studio" />
		<meta
			name="twitter:description"
			content="Visual configuration editor for claude-powerline — design themes, styles, segments, and TUI layouts for your Claude Code status line (/statusline) with a live terminal preview."
		/>
		<meta name="twitter:image" content="https://powerline.owloops.com/og.png" />
		<title>Powerline Studio</title>
		<script>
			;(function () {
				var s = localStorage.getItem('color-scheme')
				if (s === 'dark' || (!s && matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark')
				}
			})()
		</script>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
